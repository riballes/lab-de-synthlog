name: Deploy

on:
  push:
    tags: ["v*"]

env:
  REGION: ${{ vars.GCP_REGION }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  SERVICE: synthlog
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/synthlog/synthlog

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  build-deploy:
    name: Build, Push & Deploy
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          TAG=${GITHUB_REF_NAME}
          docker build -t ${{ env.IMAGE }}:${TAG} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${TAG}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${GITHUB_REF_NAME} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --port=8080 \
            --allow-unauthenticated \
            --set-env-vars="SYNTHLOG_API_KEY=${{ secrets.SYNTHLOG_API_KEY }}" \
            --quiet
