name: credential_stuffing
description: "Rapid failed logins from a single IP against multiple users, with one eventual success"
schedule:
  start_offset: "PT2H"    # 2 hours into simulation
  duration: "PT15M"
parameters:
  attacker_geo:
    city: "Moscow"
    state: "Moscow"
    country: "Russia"
    postal_code: "101000"
    latitude: 55.7558
    longitude: 37.6173
    as_number: 48159
    as_org: "Hosting Solutions International"
    isp: "Hosting Solutions"
    domain: "hostile-hosting.example"
  target_count: 5           # how many users to target (up to pool size)
  attempt_interval_seconds: 10
steps:
  - event_type: "user.session.start"
    outcome: "FAILURE"
    outcome_reason: "INVALID_CREDENTIALS"
    severity: "WARN"
    repeat_per_target: true
    description: "Failed login attempts across multiple users"
  - event_type: "user.session.start"
    outcome: "SUCCESS"
    target_index: -1        # last targeted user
    description: "Attacker successfully logs in with one credential"
  - event_type: "user.authentication.auth_via_mfa"
    outcome: "SUCCESS"
    target_index: -1
    description: "MFA bypass or compromised second factor"
  - event_type: "user.authentication.sso"
    outcome: "SUCCESS"
    target_index: -1
    target_app_index: 0
    description: "Attacker accesses an application"
